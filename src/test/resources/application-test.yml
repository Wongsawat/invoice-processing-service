spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  flyway:
    enabled: false

# Apache Camel configuration
camel:
  springboot:
    name: invoice-processing-camel-test
    main-run-controller: false

app:
  kafka:
    bootstrap-servers: localhost:9092
    topics:
      invoice-processed: invoice.processed.test
      dlq: invoice.processing.dlq.test

logging:
  level:
    root: WARN
    com.wpanther.invoice.processing: INFO
    org.apache.camel: INFO
