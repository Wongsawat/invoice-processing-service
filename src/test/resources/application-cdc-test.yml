server:
  port: 0

spring:
  application:
    name: invoice-processing-service-cdc-test

  datasource:
    url: jdbc:postgresql://localhost:5433/invoiceprocess_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 5

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

camel:
  springboot:
    main-run-controller: false
  dataformat:
    jackson:
      auto-discover-object-mapper: true

eureka:
  client:
    enabled: false

app:
  kafka:
    bootstrap-servers: localhost:9093
    topics:
      invoice-processed: invoice.processed
      dlq: invoice.processing.dlq
      saga-command-invoice: saga.command.invoice
      saga-compensation-invoice: saga.compensation.invoice
      saga-reply-invoice: saga.reply.invoice

logging:
  level:
    root: WARN
    com.wpanther.invoice.processing: DEBUG
