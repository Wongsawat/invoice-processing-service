server:
  port: 8082

spring:
  application:
    name: invoice-processing-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:invoiceprocess_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Apache Camel configuration
camel:
  springboot:
    name: invoice-processing-camel
    main-run-controller: true
  dataformat:
    jackson:
      auto-discover-object-mapper: true
  component:
    kafka:
      brokers: ${KAFKA_BROKERS:localhost:9092}
      
# Application-specific configuration
app:
  outbox:
    cleanup:
      retention-days: 7
      cron: "0 0 2 * * *"

  parsing:
    timeout-seconds: 10
    max-concurrent: 300

  invoice:
    default-due-date-days: 30

  camel:
    retry:
      max-redeliveries: 3
      redelivery-delay-ms: 1000
      backoff-multiplier: 2.0
      max-redelivery-delay-ms: 10000

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumers:
      max-poll-records: 100
      count: 3
    topics:
      # Saga topics (orchestrator to service communication)
      saga-command-invoice: saga.command.invoice
      saga-compensation-invoice: saga.compensation.invoice
      saga-reply-invoice: saga.reply.invoice
      # Notification topics (service to service communication)
      invoice-processed: invoice.processed
      dlq: invoice.processing.dlq

# Eureka client configuration
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    hostname: ${HOSTNAME:localhost}
    instance-id: ${spring.application.name}:${random.value}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,camelroutes
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  prometheus:
    metrics:
      export:
        enabled: true

# Logging configuration
logging:
  level:
    root: INFO
    com.wpanther.invoice.processing: DEBUG
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
